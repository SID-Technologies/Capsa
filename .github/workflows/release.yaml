name: Release

# Manual, Pilum-driven release. Bumps the version, cuts a tag + GitHub Release,
# and deploys the production build to Cloudflare Pages via Pilum (pilum.yaml).
#
# Requires two repo secrets, read by Pilum through pilum.yaml:
#   CLOUDFLARE_API_TOKEN    (token_env)
#   CLOUDFLARE_ACCOUNT_ID   (account_id_env)
# Needs Pilum's account_id_env support — installed below from the main branch.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Pilum
        run: go install github.com/sid-technologies/pilum@main

      - name: Determine version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || echo "")

          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          CLEAN="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION"

      - name: Build via Pilum
        run: pilum build -t latest capsa

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Deploy to Cloudflare Pages via Pilum
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pilum deploy -t latest capsa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
