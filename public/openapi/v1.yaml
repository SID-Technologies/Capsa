openapi: '3.0.1'
info:
  version: 1.0.0
  title: Example API
  description: |
    A tiny example spec so the API reference renders out of the box.
    Replace this with your own OpenAPI document (see the Configuration guide).
servers:
  - url: https://api.example.com/v1
    description: Production
paths:
  /widgets:
    get:
      tags: [widgets]
      operationId: ListWidgets
      summary: List widgets
      responses:
        '200':
          description: A page of widgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Widget'
    post:
      tags: [widgets]
      operationId: CreateWidget
      summary: Create a widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewWidget'
      responses:
        '201':
          description: The created widget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'
  /widgets/{id}:
    get:
      tags: [widgets]
      operationId: GetWidget
      summary: Fetch a widget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The widget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Widget'
        '404':
          description: Not found
components:
  schemas:
    Widget:
      type: object
      properties:
        id:
          type: string
          example: wgt_123
        name:
          type: string
          example: Sprocket
        created_at:
          type: string
          format: date-time
      required: [id, name]
    NewWidget:
      type: object
      properties:
        name:
          type: string
          example: Sprocket
      required: [name]
